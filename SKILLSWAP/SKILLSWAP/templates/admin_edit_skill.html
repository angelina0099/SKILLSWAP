{% extends "base.html" %}

{% block content %}
  <div class="card-header">
    <h1 class="card-title">Edit Skill</h1>
    <a class="button" href="{% url 'admin_skills' %}">Back to Skills</a>
  </div>

  <div class="card">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="button">Save changes</button>
    </form>
  </div>
{% endblock %}
