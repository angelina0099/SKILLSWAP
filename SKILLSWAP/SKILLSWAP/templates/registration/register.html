{% extends "base.html" %}

{% block content %}
  <div class="card" style="max-width: 420px; margin: 0 auto;">
    <div class="card-header">
      <h1 class="card-title">Create an account</h1>
    </div>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="button">Register</button>
    </form>
    <p style="margin-top: 12px; color: var(--muted);">Already have an account? <a href="{% url 'login' %}">Log in</a>.</p>
  </div>
{% endblock %}
