{% extends "base.html" %}

{% block content %}
  <div class="card">
    <div class="card-header">
      <h1 class="card-title">Add a Skill</h1>
      <a class="button secondary" href="{% url 'home' %}">Back to Home</a>
    </div>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="button">Save Skill</button>
    </form>
  </div>
{% endblock %}
