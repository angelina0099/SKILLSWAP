{% extends "base.html" %}

{% block content %}
  <div class="card-header">
    <h1 class="card-title">Delete Skill</h1>
    <a class="button" href="{% url 'admin_skills' %}">Back to Skills</a>
  </div>

  <div class="card">
    <p>Are you sure you want to delete the skill <strong>{{ skill.title }}</strong> by {{ skill.owner.username }}?</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="button" style="background:#dc2626;">Yes, delete</button>
      <a class="button secondary" href="{% url 'admin_skills' %}">Cancel</a>
    </form>
  </div>
{% endblock %}
