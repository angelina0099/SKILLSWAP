{% extends "base.html" %}

{% block content %}
  <div class="card-header">
    <h1 class="card-title">Delete Exchange Request</h1>
    <a class="button" href="{% url 'admin_requests' %}">Back to Requests</a>
  </div>

  <div class="card">
    <p>Are you sure you want to delete the exchange request by <strong>{{ request_obj.sender.username }}</strong> for <strong>{{ request_obj.skill.title }}</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="button" style="background:#dc2626;">Yes, delete</button>
      <a class="button secondary" href="{% url 'admin_requests' %}">Cancel</a>
    </form>
  </div>
{% endblock %}
